name: Update Data Action

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetchDDragon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch DDragon Data
        run: node scripts/fetch-ddragon-data.js

      - name: Fetch Merkai Data
        # run: node scripts/fetch-merkai-data.js
        run: echo "Does it work?"

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/cached-data.json
          git diff --staged --quiet || git commit -m "chore: update data $(date -u +%Y-%m-%d)"
          git push